<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tingkiw | 個人名片</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        .profile-pic {
            width: 80px;
            height: 80px;
            background: #2575fc;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            font-weight: bold;
        }
        h1 { margin: 10px 0; font-size: 24px; }
        p { color: #666; margin-bottom: 25px; }
        .links a {
            display: block;
            text-decoration: none;
            background: #fff;
            color: #2575fc;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #2575fc;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .links a:hover { background: #2575fc; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-pic">T</div>
        <h1>Tingkiw</h1>
        <p>行動開發探索者 📱</p>
        <div class="links">
            <a href="#">我的作品集</a>
            <a href="https://github.com/tingkiw">GitHub 主頁</a>
            <a href="#">聯絡我</a>
        </div>
    </div>
</body>
</html>
