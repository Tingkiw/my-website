<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <title>OpenClaw 工作動態看板 - 修正版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --db-bg: #f6f7fb;
      --db-card-bg: #ffffff;
      --db-text-color: #333333;
      --db-primary-color: #4285f4;
      --db-success-color: #34a853;
      --db-warning-color: #fbbc05;
      --db-error-color: #ea4335;
      --db-progress-color: #8ab4f8;
      --db-header-bg: #2d3e50;
      --db-card-shadow: 0 4px 12px rgba(0,0,0,0.08);
      --db-border-color: #eee;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--db-bg); color: var(--db-text-color); }
    header { padding: 20px; text-align:center; background:var(--db-header-bg); color:white; }
    header h1 { margin:0; font-size: 1.5rem; }
    .container { padding: 20px; max-width: 1100px; margin:0 auto; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
    .card { background: var(--db-card-bg); border-radius: 12px; padding: 20px; box-shadow: var(--db-card-shadow); margin-bottom: 20px; }
    .card h3 { margin-top: 0; border-bottom: 2px solid var(--db-border-color); padding-bottom: 10px; font-size: 1.1rem; }
    
    /* 狀態圖示樣式 */
    .status-icon { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
    .status-success { background: var(--db-success-color); box-shadow: 0 0 8px var(--db-success-color); }
    .status-failed { background: var(--db-error-color); box-shadow: 0 0 8px var(--db-error-color); }
    .status-warning { background: var(--db-warning-color); }
    .status-in_progress { background: var(--db-progress-color); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

    pre { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.9rem; line-height: 1.5; }
    .alert-item { color: var(--db-error-color); font-weight: bold; list-style: none; padding: 10px; background: #fff5f5; border-radius: 6px; border-left: 4px solid var(--db-error-color); }
  </style>
</head>
<body>

<header>
  <h1>OpenClaw 工作動態看板</h1>
  <div id="update-time">初始化中...</div>
</header>

<div class="container">
  <div class="dashboard-grid">
    <div class="card">
      <h3>最新專案狀態</h3>
      <div id="db-latest-status"></div>
    </div>

    <div class="card">
      <h3>今日活動摘要</h3>
      <ul id="db-today-tasks" style="list-style: none; padding: 0;"></ul>
    </div>

    <div class="card" id="db-alerts-card" style="display:none; grid-column: 1 / -1;">
      <h3 style="color: var(--db-error-color);">🚨 系統緊急警示</h3>
      <div id="db-alerts-list"></div>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
      <h3>近期 Commit 紀錄</h3>
      <pre id="db-recent-commits"></pre>
    </div>
  </div>
</div>

<script>
  // 圖示轉換邏輯
  const renderStatusIcon = (status) => {
    const s = status.toLowerCase();
    let className = 'status-info';
    if (s === 'success' || s === 'ok') className = 'status-success';
    if (s === 'failed' || s === 'error') className = 'status-failed';
    if (s === 'warning') className = 'status-warning';
    if (s === 'in_progress') className = 'status-in_progress';
    return `<span class="status-icon ${className}"></span>`;
  };

  const renderDashboard = (data) => {
    // 1. 更新時間
    document.getElementById('update-time').innerText = `資料時間：${new Date(data.generated_at).toLocaleString()}`;

    // 2. 渲染最新狀態
    const ls = data.latest_status;
    document.getElementById('db-latest-status').innerHTML = `
      <p>${renderStatusIcon(ls.build.status)} <strong>Build:</strong> ${ls.build.status} (${ls.build.branch})</p>
      <p>${renderStatusIcon(ls.test.status)} <strong>Test:</strong> ${ls.test.status} <span style="color:var(--db-error-color)">(${ls.test.failed_count} 失敗)</span></p>
      <p>${renderStatusIcon(ls.deploy_staging.status)} <strong>Staging:</strong> ${ls.deploy_staging.status}</p>
    `;

    // 3. 渲染今日活動
    const taskList = document.getElementById('db-today-tasks');
    taskList.innerHTML = data.today_activities.map(act => `
      <li style="margin-bottom:10px;">
        <small>${act.time}</small> | ${renderStatusIcon(act.status)} <strong>${act.action}</strong> - ${act.skill || act.project}
      </li>
    `).join('');

    // 4. 處理警示 (Alerts)
    const alertCard = document.getElementById('db-alerts-card');
    if (data.alerts && data.alerts.length > 0) {
      alertCard.style.display = 'block';
      document.getElementById('db-alerts-list').innerHTML = data.alerts.map(a => `
        <div class="alert-item">⚠️ ${a.message} (${new Date(a.timestamp).toLocaleTimeString()})</div>
      `).join('');
    }

    // 5. 渲染 Commit
    document.getElementById('db-recent-commits').textContent = data.recent_commits.map(c => 
      `[${c.hash.substring(0,7)}] ${c.message} (${c.author})`
    ).join('\n');
  };

  // 啟動資料載入
  const rawData = {
    "generated_at": "2026-02-26T09:05:00+08:00",
    "latest_status": {
      "build": { "status": "success", "branch": "main" },
      "test": { "status": "failed", "failed_count": 5 },
      "deploy_staging": { "status": "in_progress" }
    },
    "today_activities": [
      {"time":"09:00","action":"install","skill":"healthcheck","status":"OK"},
      {"time":"09:15","action":"trigger_build","project":"pixel-agents","status":"success"},
      {"time":"09:30","action":"run_tests","project":"pixel-agents","status":"failed"},
      {"time":"09:45","action":"start_deploy","project":"pixel-agents","status":"in_progress"}
    ],
    "recent_commits": [
      { "hash": "a1b2c3d4", "message": "feat: Add new agent behavior", "author": "dev_user" },
      { "hash": "e5f6g7h8", "message": "fix: Resolve UI rendering bug", "author": "tester_user" }
    ],
    "alerts": [
      { "level": "warning", "message": "High test failure rate detected.", "timestamp": "2026-02-26T09:04:00Z" }
    ]
  };

  // 優先嘗試從檔案讀取，失敗則使用上方預設資料
  // 定義一個執行更新的函式
const updateDashboard = () => {
  console.log("正在檢查更新...", new Date().toLocaleTimeString());
  
  fetch('data.json')
    .then(response => {
      if (!response.ok) throw new Error("讀取失敗");
      return response.json();
    })
    .then(data => renderDashboard(data))
    .catch(() => {
      // 如果讀不到檔案，就用預設資料渲染（示範用）
      renderDashboard(rawData);
    });
};

// 1. 頁面載入後立即執行一次
updateDashboard();

// 2. 設定每 30 秒自動執行一次 (30000 毫秒)
setInterval(updateDashboard, 30000);
</script>

</body>
</html>
