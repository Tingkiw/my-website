<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>OpenClaw 工作動態看板 - 測試版</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body { font-family: Arial, sans-serif; margin: 0; background:#f6f7fb; color:#333; }
.container { padding: 16px; max-width: 900px; margin: 0 auto; }
h1 { font-size: 1.2rem; margin: 0 0 12px; }
.card { background:#fff; border-radius:10px; padding:16px; margin-bottom:12px; box-shadow:0 2px 6px rgba(0,0,0,.05); }
ul { padding-left:20px; }
canvas { width:100% !important; height:240px; }
</style>
</head>
<body>
<div class="container">
<h1>OpenClaw 工作動態看板 - 測試</h1><div class="card">
<h3>最新專案狀態</h3>
<div id="latest-status">載入中…</div>
</div><div class="grid">
<div class="card" style="width:100%;">
<h3>今日活動摘要</h3>
<ul id="today-tasks"></ul>
</div>
<div class="card" style="width:100%;">
<h3>技能使用統計（今日）</h3>
<canvas id="usageChart"></canvas>
</div>
</div><div class="card">
<h3>最近動作清單</h3>
<pre id="recent-actions" style="margin:0; background:#111; color:#fff; padding:12px; border-radius:6px; max-height:180px; overflow:auto;"></pre>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
async function loadData(){
try{
const res = await fetch('data.json');
if(!res.ok) throw new Error('data.json 載入失敗');
return await res.json();
}catch(e){
// 若失敗，回退到硬編碼的範例
return {
generated_at: "2026-02-26T09:05:00+08:00",
latest_status: { build: { status:"success", branch:"main" }, test: { status:"failed", failed_count:5 } },
today_activities: [
{ time:"09:00", action:"install", skill:"healthcheck", status:"OK" }
],
recent_commits: [
{ hash:"abcd1234", message:"Initial test data", author:"you", timestamp:"2026-02-26T08:50:00Z" }
],
usage: [
{ name:"healthcheck", count:4, success:4 }
]
};
}
}
 // 最新狀態
  const latest = document.getElementById('latest-status');
  latest.innerHTML = '';
  if (data.latest_status){
    if (data.latest_status.build){
      latest.innerHTML += `<p>Build: ${data.latest_status.build.status} (${data.latest_status.build.branch})</p>`;
    }
    if (data.latest_status.test){
      latest.innerHTML += `<p>Test: ${data.latest_status.test.status} (${data.latest_status.test.failed_count||0} failures)</p>`;
    }
  }

  // 今日要點
  const todayEl = document.getElementById('today-tasks');
  todayEl.innerHTML = '';
  (data.today_activities||[]).forEach(t=>{
    const li = document.createElement('li');
    li.textContent = `[${t.time}] ${t.action} ${t.skill||''} - ${t.status}`;
    todayEl.appendChild(li);
  });
// 最近動作
  const recentEl = document.getElementById('recent-actions');
  recentEl.textContent = (data.recent_commits||[]).map(c => `[${new Date(c.timestamp).toLocaleTimeString()}] ${c.hash.substring(0,7)} ${c.message} - ${c.author}`).join("\n");

  // Chart
  const ctx = document.getElementById('usageChart').getContext('2d');
  if (ctx){
    if (window.usageChart) window.usageChart.destroy();
    window.usageChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: (data.usage||[]).map(u => u.name),
        datasets: [{
          label: '執行次數',
          data: (data.usage||[]).map(u => u.count),
          backgroundColor: 'rgba(54, 162, 235, 0.65)'
        }]
      },
      options: { scales: { y: { beginAtZero: true } }, plugins: { legend: { display:false } } }
    });
  }
}

loadData().then(render);
</script>
</body>
</html>
